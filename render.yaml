services:
  - type: web
    name: mail-sender-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # single worker (send-job state is in-memory) + threads so live-progress
    # polls are answered while a batch is sending in the background
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 120
    autoDeploy: true
